<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Вход - Smart Bookshelf">
    <title>Вход - Smart Bookshelf</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/pages/login.css">
</head>
<body>
    <!-- Video Background Layer -->
    <div class="video-container">
        <!-- First Video: Book Opening (paused initially) -->
        <video id="openingVideo" class="video-background active" preload="auto">
            <source src="login/opening.mp4" type="video/mp4">
        </video>
        
        <!-- Second Video: Loop Background (hidden initially, slowed down) -->
        <video id="loopVideo" class="video-background" preload="auto" loop>
            <source src="login/после.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Click Overlay (blocks interaction during video) -->
    <div id="clickOverlay" class="click-overlay">
        <div class="click-hint">
            <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"/>
            </svg>
            <span>Нажмите на экран</span>
        </div>
    </div>

    <!-- Login Form (appears from right during video) -->
    <div id="loginFormContainer" class="login-form-container">
        <!-- Login Card -->
        <div id="loginCard" class="login-card active">
            <div class="login-card__header">
                <h1 class="login-card__title">Welcome</h1>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        class="form-input" 
                        placeholder="Your name" 
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="••••••••" 
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="btn-signin">Sign In</button>
            </form>

            <div class="login-card__footer">
                <p>Нет аккаунта? <a href="#" id="showSignup" class="signup-link">Создать аккаунт</a></p>
            </div>
        </div>

        <!-- Signup Card -->
        <div id="signupCard" class="login-card">
            <div class="login-card__header">
                <h1 class="login-card__title">Create Account</h1>
            </div>

            <form id="signupForm" class="login-form">
                <div class="form-group">
                    <label class="form-label" for="signupUsername">Username</label>
                    <input 
                        type="text" 
                        id="signupUsername" 
                        class="form-input" 
                        placeholder="Your name" 
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="signupEmail">Email</label>
                    <input 
                        type="email" 
                        id="signupEmail" 
                        class="form-input" 
                        placeholder="your@email.com" 
                        required
                        autocomplete="email"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="signupPassword">Password</label>
                    <input 
                        type="password" 
                        id="signupPassword" 
                        class="form-input" 
                        placeholder="••••••••" 
                        required
                        autocomplete="new-password"
                    >
                </div>

                <button type="submit" class="btn-signin">Create Account</button>
            </form>

            <div class="login-card__footer">
                <p>Уже есть аккаунт? <a href="#" id="showLogin" class="signup-link">Войти</a></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/login.js"></script>
</body>
</html>
