<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Авторизация - Smart Bookshelf">
    <title>Авторизация - Smart Bookshelf</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Bangers&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/pages/auth.css">
</head>
<body>
    <!-- Comic Background -->
    <div class="comic-background">
        <!-- Add your Invincible comic image: images/invincible-bg.jpg -->
    </div>

    <!-- Auth Container -->
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-box__header">
                <h1 class="auth-box__title">WELCOME!</h1>
                <p class="auth-box__subtitle">Enter your credentials</p>
            </div>

            <form id="authForm" class="auth-form">
                <div class="form-group">
                    <label class="form-label" for="authUsername">USERNAME</label>
                    <input 
                        type="text" 
                        id="authUsername" 
                        class="form-input" 
                        placeholder="Your name" 
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="authPassword">PASSWORD</label>
                    <input 
                        type="password" 
                        id="authPassword" 
                        class="form-input" 
                        placeholder="••••••••" 
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="btn-submit">SIGN IN!</button>
            </form>

            <div class="auth-box__footer">
                <p>Don't have an account? <a href="login.html" class="auth-link">Go back</a></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
</body>
</html>
